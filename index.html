<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafees Home Foods | Order Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #2c2c2c; --white: #ffffff; --light: #f4f4f4; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; color: var(--dark); padding-bottom: 100px; }
        nav { background: var(--dark); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: var(--gold); text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1585937421612-70a008356fbe?q=80&w=1200&auto=format&fit=crop'); 
                background-size: cover; background-position: center; height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--gold); text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section-title { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-top: 30px; text-transform: uppercase; }
        .menu-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .menu-card { background: var(--light); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--dark); color: var(--gold); border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* CART BAR */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 20px; display: none; justify-content: space-between; align-items: center; border-top: 3px solid var(--gold); z-index: 2000; }
        .order-btn { background: #25D366; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<nav>
    <a href="#fastfood">Fast Food</a>
    <a href="#rice">Rice & Curries</a>
    <a href="#bread">Breads</a>
</nav>

<header class="hero" id="home">
    <h1>NAFEES HOME FOODS</h1>
    <p>14 Peppertree Place, Mount Pearl</p>
</header>

<div class="container">
    <h2 id="fastfood" class="section-title">Snacks & Fast Food</h2>
    <div class="menu-list" id="fastfood-list"></div>

    <h2 id="rice" class="section-title">Rice & Mains</h2>
    <div class="menu-list" id="rice-list"></div>

    <h2 id="bread" class="section-title">Breads</h2>
    <div class="menu-list" id="bread-list"></div>
</div>

<div id="cart-bar">
    <div><strong>Items in Cart:</strong> <span id="cart-count">0</span> | <strong>Total:</strong> $<span id="cart-total">0</span></div>
    <button class="order-btn" onclick="sendToWhatsApp()"><i class="fab fa-whatsapp"></i> Send Order on WhatsApp</button>
</div>

<script>
    const menu = [
        { name: "Samosa (1 pc)", price: 3, cat: "fastfood" },
        { name: "Samosa (4 pcs)", price: 10, cat: "fastfood" },
        { name: "Zinger Burger", price: 15, cat: "fastfood" },
        { name: "Zinger Burger Combo", price: 18, cat: "fastfood" },
        { name: "Zinger Roll", price: 13, cat: "fastfood" },
        { name: "Shawarma", price: 13, cat: "fastfood" },
        { name: "Full Chicken Roast", price: 35, cat: "fastfood" },
        { name: "Mutton Qabli Pulao", price: 25, cat: "rice" },
        { name: "Chicken Biryani", price: 17, cat: "rice" },
        { name: "Chicken Pulao", price: 13, cat: "rice" },
        { name: "Chicken Salan", price: 10, cat: "rice" },
        { name: "Simple Naan", price: 2, cat: "bread" },
        { name: "Roghni Naan", price: 3, cat: "bread" },
        { name: "Alo Pratha", price: 5, cat: "bread" }
    ];

    let cart = [];

    function renderMenu() {
        menu.forEach(item => {
            const list = document.getElementById(`${item.cat}-list`);
            const div = document.createElement('div');
            div.className = 'menu-card';
            div.innerHTML = `<div><span class="item-name">${item.name}</span><br><small>$${item.price}</small></div>
                             <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+ Add</button>`;
            list.appendChild(div);
        });
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateCartBar();
    }

    function updateCartBar() {
        const bar = document.getElementById('cart-bar');
        const count = document.getElementById('cart-count');
        const total = document.getElementById('cart-total');
        
        if (cart.length > 0) {
            bar.style.display = 'flex';
            count.innerText = cart.length;
            const sum = cart.reduce((acc, item) => acc + item.price, 0);
            total.innerText = sum;
        }
    }

    function sendToWhatsApp() {
        let message = "Assalamu Alaikum! I would like to place an order from Nafees Home Foods:%0A%0A";
        let total = 0;
        cart.forEach((item, index) => {
            message += `${index + 1}. ${item.name} - $${item.price}%0A`;
            total += item.price;
        });
        message += `%0A*TOTAL: $${total}*%0A%0APickup at 14 Peppertree Place.`;
        window.open(`https://wa.me/17097309719?text=${message}`, '_blank');
    }

    renderMenu();
</script>

</body>
</html>
