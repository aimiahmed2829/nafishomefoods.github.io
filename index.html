<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafees Home Foods | Order Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #2c2c2c; --white: #ffffff; --light: #f4f4f4; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; color: var(--dark); padding-bottom: 200px; background-color: #fff; }
        
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1585937421612-70a008356fbe?q=80&w=1200&auto=format&fit=crop'); 
            background-size: cover; background-position: center; 
            height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: var(--gold); text-align: center; padding: 20px;
        }

        .logo-container {
            width: 90px; height: 90px; background: white; border-radius: 50%; padding: 5px;
            margin-bottom: 10px; border: 3px solid var(--gold); overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section-title { 
            background-color: var(--dark); color: var(--gold); padding: 10px 15px; 
            margin-top: 35px; text-transform: uppercase; border-radius: 5px; font-size: 1.2rem;
        }
        .menu-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .menu-card { 
            background: var(--light); padding: 15px; border-radius: 8px; border-left: 5px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .item-info strong { display: block; font-size: 1.05rem; margin-bottom: 3px; }
        .item-info small { color: #666; font-weight: bold; }
        
        .add-btn { background: var(--dark); color: var(--gold); border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn:hover { background: var(--gold); color: var(--dark); }

        /* FOOTER CART SYSTEM */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 20px; display: none; flex-direction: column; border-top: 4px solid var(--gold); z-index: 2000; }
        .customer-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .customer-inputs input { padding: 12px; border-radius: 5px; border: none; font-size: 1rem; }
        .cart-items-preview { font-size: 0.9rem; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .cart-tag { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 8px; }
        .remove-btn { color: #ff4d4d; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 1.2rem; }
        .order-btn { background: #25D366; color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* MODAL */
        #confirm-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; color: var(--dark); padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header class="hero">
    <div class="logo-container">
        <img src="logo.jpg" alt="Nafees Home Foods Logo">
    </div>
    <h1>NAFEES HOME FOODS</h1>
    <p>14 Peppertree Place, Mount Pearl | 709-730-9719</p>
</header>

<div class="container">
    <h2 class="section-title">Rice</h2>
    <div class="menu-list" id="rice-list"></div>

    <h2 class="section-title">Snacks / Fast Food</h2>
    <div class="menu-list" id="snacks-list"></div>

    <h2 class="section-title">Salan (Curry)</h2>
    <div class="menu-list" id="salan-list"></div>

    <h2 class="section-title">Roti / Naan / Pratha</h2>
    <div class="menu-list" id="roti-list"></div>
</div>

<div id="cart-bar">
    <div class="customer-inputs">
        <input type="text" id="cust-name" placeholder="Your Name">
        <input type="tel" id="cust-phone" placeholder="Contact Number">
    </div>
    <div class="cart-items-preview" id="cart-preview"></div>
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <div style="font-size: 1.3rem;"><strong>Total: $<span id="cart-total">0</span></strong></div>
        <button class="order-btn" onclick="showReview()"><i class="fab fa-whatsapp"></i> Review & Send</button>
    </div>
</div>

<div id="confirm-modal">
    <div class="modal-content">
        <h2 style="color:var(--gold)">Review Order</h2>
        <div id="modal-info"></div>
        <div id="modal-items" style="background:#f9f9f9; padding:15px; border-radius:8px; margin:15px 0; max-height:200px; overflow-y:auto; line-height:1.6;"></div>
        <div style="font-size:1.3rem; margin-bottom:20px;"><strong>Total: $<span id="modal-total">0</span></strong></div>
        <div class="modal-btns">
            <button style="background:#ddd;" onclick="closeReview()">Back</button>
            <button style="background:#25D366; color:white;" onclick="sendOrder()">Confirm & Send</button>
        </div>
    </div>
</div>

<script>
    const menu = [
        // RICE
        { name: "Biryani", price: 17, cat: "rice", note: "Per Serving" },
        { name: "Chicken Pulao", price: 13, cat: "rice", note: "Per Serving" },
        { name: "Mutton Qabli Pulao", price: 25, cat: "rice", note: "Per Serving" },
        { name: "Chicken Qabli Pulao", price: 17, cat: "rice", note: "Per Serving" },
        { name: "Boiled Rice", price: 5, cat: "rice", note: "Per Plate" },
        { name: "Tarke Wale Chawal", price: 6, cat: "rice", note: "Per Plate" },
        
        // SNACKS
        { name: "Samosa (1 pc)", price: 3, cat: "snacks", note: "$3 ea / 4 for $10" },
        { name: "Samosa (4 pcs)", price: 10, cat: "snacks", note: "Bundle Price" },
        { name: "Full Chicken Roast", price: 35, cat: "snacks", note: "" },
        { name: "Chicken Tikka", price: 10, cat: "snacks", note: "Per Tikka" },
        { name: "Zinger Burger", price: 13, cat: "snacks", note: "$15 with Fries" },
        { name: "Zinger Burger + Fries", price: 15, cat: "snacks", note: "Combo" },
        { name: "Zinger Roll", price: 13, cat: "snacks", note: "" },
        { name: "Shawarma", price: 13, cat: "snacks", note: "" },
        { name: "Pakora", price: 10, cat: "snacks", note: "One Plate" },
        { name: "Raaiyta / Salad", price: 5, cat: "snacks", note: "" },

        // SALAN
        { name: "Daal (Moong/Masoor/Mash)", price: 5, cat: "salan", note: "Per Plate" },
        { name: "Spicy Mash/Chane Ki Daal", price: 6, cat: "salan", note: "Per Plate" },
        { name: "White Chickpeas", price: 6, cat: "salan", note: "Per Plate" },
        { name: "Chicken Salan", price: 10, cat: "salan", note: "Per Plate" },
        { name: "Alo Ande Salan", price: 8, cat: "salan", note: "Per Plate" },
        { name: "Alo Qeema Salan", price: 10, cat: "salan", note: "Per Plate" },
        { name: "Mix Sabzi", price: 8, cat: "salan", note: "Per Plate" },
        { name: "Alo Matar Salan", price: 8, cat: "salan", note: "Per Plate" },

        // ROTI
        { name: "Roti (Chapati)", price: 2, cat: "roti", note: "Per Chapati" },
        { name: "Roghni Naan", price: 3, cat: "roti", note: "Per Naan" },
        { name: "Simple Naan", price: 2, cat: "roti", note: "Per Naan" },
        { name: "Alo Methi Pratha", price: 5, cat: "roti", note: "Per Pratha" },
        { name: "Alo Pratha", price: 5, cat: "roti", note: "Per Pratha" },
        { name: "Besan Wala Naan", price: 6, cat: "roti", note: "Per Naan" }
    ];

    let cart = {};

    function renderMenu() {
        menu.forEach(item => {
            const list = document.getElementById(`${item.cat}-list`);
            const div = document.createElement('div');
            div.className = 'menu-card';
            div.innerHTML = `<div class="item-info"><strong>${item.name}</strong><small>$${item.price} ${item.note}</small></div>
                             <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+ Add</button>`;
            list.appendChild(div);
        });
    }

    function addToCart(name, price) {
        if (cart[name]) cart[name].qty += 1;
        else cart[name] = { price: price, qty: 1 };
        updateCart();
    }

    function removeFromCart(name) { delete cart[name]; updateCart(); }

    function updateCart() {
        const bar = document.getElementById('cart-bar');
        const preview = document.getElementById('cart-preview');
        const totalDisp = document.getElementById('cart-total');
        const keys = Object.keys(cart);
        
        if (keys.length > 0) {
            bar.style.display = 'flex';
            preview.innerHTML = keys.map(n => `<div class="cart-tag">${n} x ${cart[n].qty} <button class="remove-btn" onclick="removeFromCart('${n}')">×</button></div>`).join('');
            let total = 0;
            keys.forEach(n => total += (cart[n].price * cart[n].qty));
            totalDisp.innerText = total;
        } else bar.style.display = 'none';
    }

    function showReview() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if (!name || !phone) { alert("Please enter your Name and Contact Number!"); return; }
        
        document.getElementById('modal-info').innerHTML = `<strong>Customer:</strong> ${name}<br><strong>Contact:</strong> ${phone}`;
        let listHtml = ""; let total = 0;
        Object.keys(cart).forEach(item => {
            const cost = cart[item].price * cart[item].qty;
            listHtml += `• ${item} x ${cart[item].qty} ($${cost})<br>`;
            total += cost;
        });
        document.getElementById('modal-items').innerHTML = listHtml;
        document.getElementById('modal-total').innerText = total;
        document.getElementById('confirm-modal').style.display = 'flex';
    }

    function closeReview() { document.getElementById('confirm-modal').style.display = 'none'; }

    function sendOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        let details = ""; let total = 0;
        Object.keys(cart).forEach(n => {
            details += `- ${n} x ${cart[n].qty} ($${cart[n].price * cart[n].qty})%0A`;
            total += cart[n].price * cart[n].qty;
        });
        const msg = `ORDER FROM: ${name}%0AContact: ${phone}%0A%0AItems:%0A${details}%0ATOTAL: $${total}%0A%0APickup: 14 Peppertree Place.`;
        window.open(`https://wa.me/17097309719?text=${msg}`, '_blank');
        closeReview();
    }
    renderMenu();
</script>
</body>
</html>
