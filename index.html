<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafees Home Foods | Authentic Family Catering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #2c2c2c; --white: #ffffff; --light: #f4f4f4; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; color: var(--dark); scroll-behavior: smooth; }
        nav { background: var(--dark); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: var(--gold); text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('http://googleusercontent.com/image_collection/image_retrieval/12313878178324313230_0'); 
                background-size: cover; background-position: center; height: 50vh; display: flex; flex-direction: column; 
                justify-content: center; align-items: center; color: var(--gold); text-align: center; }
        
        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        
        .section-title { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        .food-card { border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; transition: 0.3s; }
        .food-card:hover { transform: translateY(-5px); }
        .food-card img { width: 100%; height: 220px; object-fit: cover; }
        .food-info { padding: 20px; }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .food-name { font-weight: bold; font-size: 1.2rem; }
        .food-price { color: var(--gold); font-weight: bold; }
        .food-desc { font-size: 0.9rem; color: #666; font-style: italic; line-height: 1.4; }
        .seasonal { background: #e74c3c; color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }

        .whatsapp-btn { background: #25D366; color: white; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: bold; display: inline-block; margin: 10px; font-size: 1.1rem; }
        .social-btn { display: inline-block; margin: 10px; padding: 12px 25px; border-radius: 5px; color: white; text-decoration: none; font-weight: bold; }
        .fb { background: #1877F2; } .ig { background: #E4405F; }
        
        footer { background: var(--dark); color: white; text-align: center; padding: 40px; margin-top: 60px; border-top: 4px solid var(--gold); }
    </style>
</head>
<body>

<nav>
    <a href="#home">Home</a>
    <a href="#fastfood">Fast Food</a>
    <a href="#main">Main Menu</a>
    <a href="#contact">Order</a>
</nav>

<header class="hero" id="home">
    <h1>NAFEES HOME FOODS</h1>
    <p>Authentic Family Cooking by Master Chef Khala</p>
    <p style="color:white; font-weight: normal;">Mount Pearl, NL</p>
</header>

                <p class="food-desc">Juicy handmade patty with fresh lettuce, tomatoes, and house sauce.</p>
            </div>
        </div>

            <img src="http://googleusercontent.com/image_collection/image_retrieval/2203459512848389895_0" alt="Chicken Wrap">
            <div class="food-info">
